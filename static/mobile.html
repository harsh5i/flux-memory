<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Flux Memory</title>
<script src="/d3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080a0e;color:#dde3f0;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;-webkit-text-size-adjust:100%}

/* -- STATUS BAR -- */
#status-bar{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;padding-top:max(6px,env(safe-area-inset-top));
  background:#0f1117;border-bottom:1px solid #1e2330;flex-shrink:0;z-index:10;
}
.brand{display:flex;align-items:center;gap:5px;font-weight:600;font-size:13px;white-space:nowrap}
.brand svg{flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.healthy{background:#4ade80}.dot.warning{background:#fbbf24}.dot.critical{background:#f43f5e}
.stats{display:flex;gap:6px;margin-left:auto;font-size:10px;color:#5a6480;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.stats b{color:#dde3f0;font-weight:600}

/* -- GRAPH -- */
#graph-wrap{position:relative;flex:1;overflow:hidden;touch-action:none;background:#080a0e}
#graph-wrap canvas{display:block;width:100%;height:100%}
#loading-screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080a0e;z-index:10;transition:opacity .4s}
#loading-screen.done{opacity:0;pointer-events:none}
#loading-screen .spinner{width:24px;height:24px;border:2px solid #1e2330;border-top-color:#22d3ee;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen .msg{font-size:12px;color:#5a6480}
#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:#3a4255;z-index:3;pointer-events:none;transition:opacity .5s}

/* -- FLOATING CONTROLS -- */
#controls{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:4}
#controls button{width:36px;height:36px;border-radius:18px;border:1px solid #1e2330;background:rgba(15,17,23,0.85);color:#dde3f0;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
#controls button:active{background:#1e2330}

/* -- BOTTOM BAR -- */
#bottom-bar{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));
  background:#0f1117;border-top:1px solid #1e2330;flex-shrink:0;z-index:5;
  min-height:44px;
}
#bottom-bar .bar-section{display:flex;align-items:center;gap:6px;overflow:hidden}
#bottom-bar .bar-label{font-size:10px;color:#5a6480;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bottom-bar .bar-value{font-size:12px;color:#dde3f0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#bottom-bar .bar-type{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#3a4255}
.bar-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}
.bar-tag.grain{background:rgba(34,211,238,0.12);color:#22d3ee}
.bar-tag.entry{background:rgba(167,139,250,0.12);color:#a78bfa}
.bar-tag.core{background:rgba(56,189,248,0.12);color:#38bdf8}
.bar-tag.working{background:rgba(74,222,128,0.12);color:#4ade80}
.bar-tag.dormant{background:rgba(30,45,64,0.4);color:#5a6480}
.bar-spacer{flex:1}
.bar-btn{padding:5px 12px;border-radius:14px;border:1px solid #252c3a;background:#161921;color:#8899b0;font-size:11px;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.bar-btn:active{background:#1e2330}
.bar-btn.primary{border-color:#22d3ee;background:rgba(34,211,238,0.08);color:#22d3ee}
.bar-btn.danger{border-color:#f43f5e;color:#f43f5e}

/* -- BOTTOM SHEET -- */
#sheet-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:20;opacity:0;pointer-events:none;transition:opacity .25s}
#sheet-backdrop.open{opacity:1;pointer-events:auto}
#sheet{position:fixed;bottom:0;left:0;right:0;background:#0f1117;border-radius:16px 16px 0 0;border-top:1px solid #1e2330;z-index:21;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;max-height:70vh;padding-bottom:env(safe-area-inset-bottom,0)}
#sheet.open{transform:translateY(0)}
#sheet-handle{width:36px;height:4px;border-radius:2px;background:#252c3a;margin:10px auto 0;flex-shrink:0}
#sheet-content{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;flex:1}
.s-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.s-icon{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-title{font-size:15px;font-weight:600;color:#dde3f0;line-height:1.2}
.s-sub{font-size:10px;color:#5a6480;margin-top:2px}
.s-section{margin-bottom:12px}
.s-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#3a4255;margin-bottom:6px}
.s-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.s-key{color:#5a6480}.s-val{color:#dde3f0;font-weight:500;text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis}

/* -- SEARCH OVERLAY -- */
#search-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,10,14,0.95);z-index:30;display:none;flex-direction:column;padding:max(16px,env(safe-area-inset-top)) 16px 16px}
#search-overlay.open{display:flex}
#search-overlay input{width:100%;padding:12px 16px;background:#161921;border:1px solid #252c3a;border-radius:12px;color:#dde3f0;font-size:16px;outline:none}
#search-overlay input:focus{border-color:#22d3ee}
#search-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-top:8px}
.sr-item{padding:10px 0;border-bottom:1px solid #1e2330;cursor:pointer}
.sr-label{font-size:13px;color:#dde3f0}
.sr-meta{font-size:11px;color:#5a6480}
#search-cancel{background:none;border:none;color:#22d3ee;font-size:16px;cursor:pointer;padding:8px;margin-left:8px}

/* -- ACTIVE BAR BTN -- */
.bar-btn.active{border-color:#22d3ee;color:#22d3ee;background:rgba(34,211,238,0.08)}

/* -- WEIGHT OVERLAY -- */
#weight-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,10,14,0.95);z-index:35;display:none;flex-direction:column;justify-content:center;padding:0 24px}
#weight-overlay.open{display:flex}
#weight-cancel{background:none;border:1px solid #252c3a;color:#dde3f0;font-size:14px;padding:6px 16px;border-radius:12px;cursor:pointer;margin-left:auto}
</style>
</head>
<body>
<div id="app" style="display:flex;flex-direction:column;height:100vh;height:100dvh">
  <div id="status-bar">
    <div class="brand">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#22d3ee" stroke-width="1.5" opacity=".3"/><circle cx="12" cy="12" r="6" stroke="#22d3ee" stroke-width="1.5" opacity=".6"/><circle cx="12" cy="12" r="2.5" fill="#22d3ee"/></svg>
      <span>Flux</span>
    </div>
    <div class="dot healthy" id="dot"></div>
    <div class="stats">
      <span><b id="s-grains">0</b> grains</span>
      <span><b id="s-cond">0</b> cond.</span>
      <span><b id="s-core">0</b> core</span>
    </div>
  </div>

  <div id="graph-wrap">
    <div id="loading-screen"><div class="spinner"></div><div class="msg">Loading...</div></div>
    <div id="hint">Pinch to zoom - Drag to pan - Tap node to inspect</div>
    <canvas id="graph-canvas"></canvas>
    <div id="controls">
      <button onclick="zoomIn()" title="Zoom in">+</button>
      <button onclick="zoomOut()" title="Zoom out">-</button>
      <button onclick="resetView()" title="Reset">&#8634;</button>
      <button onclick="toggleSearch()" title="Search">&#128269;</button>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="bar-default">
      <button class="bar-btn active" id="f-grain" onclick="toggleFilter('grain')">Grains</button>
      <button class="bar-btn active" id="f-entry" onclick="toggleFilter('entry')">Entry</button>
      <button class="bar-btn active" id="f-active" onclick="toggleFilter('active')">Active</button>
      <button class="bar-btn" id="f-dormant" onclick="toggleFilter('dormant')">Dormant</button>
      <div class="bar-spacer"></div>
      <button class="bar-btn" onclick="openWeight()">Weight</button>
    </div>
    <div id="bar-selected" style="display:none">
      <span class="bar-tag" id="bar-node-type">grain</span>
      <span class="bar-value" id="bar-node-label">-</span>
      <div class="bar-spacer"></div>
      <button class="bar-btn danger" onclick="deselectNode()">Deselect</button>
      <button class="bar-btn primary" onclick="openSheet()">Inspect</button>
    </div>
  </div>
</div>

<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<div id="search-overlay">
  <div style="display:flex;align-items:center">
    <input type="text" id="search-input" placeholder="Search nodes..." oninput="onSearch(this.value)">
    <button id="search-cancel" onclick="toggleSearch()">Cancel</button>
  </div>
  <div id="search-results"></div>
</div>

<div id="weight-overlay">
  <div style="display:flex;align-items:center;margin-bottom:12px">
    <span style="color:#dde3f0;font-size:14px;font-weight:600">Edge Weight Filter</span>
    <button id="weight-cancel" onclick="openWeight()">Done</button>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="color:#5a6480;font-size:11px">0</span>
    <input type="range" min="0" max="1" step="0.01" value="0" id="weight-slider" oninput="onWeight(this.value)" style="flex:1">
    <span style="color:#dde3f0;font-size:11px;font-weight:600" id="weight-val">0.00</span>
  </div>
</div>

<script>
let graphData=null,healthData=null,sim=null;
let canvas,ctx,W,H,dpr;
let transform={x:0,y:0,k:1};
let simNodes=[],simLinks=[];
let selectedNode=null;
let dragNode=null,touchStartTime=0,lastTouchDist=0,lastTouchCenter=null;
let hintTimer=null;

function init(){
  canvas=document.getElementById('graph-canvas');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd);
  canvas.addEventListener('click',onClick);
  fetchData();
  // Hide hint after 5s
  hintTimer=setTimeout(function(){document.getElementById('hint').style.opacity='0'},5000);
}

function resize(){
  var wrap=document.getElementById('graph-wrap');
  W=wrap.clientWidth;H=wrap.clientHeight;
  if(W<1||H<1){requestAnimationFrame(resize);return}
  dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(sim)draw();
}

async function fetchData(){
  var ld=document.getElementById('loading-screen');
  var ldMsg=ld.querySelector('.msg');
  try{
    ldMsg.textContent='Fetching data...';
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort()},20000);
    var h=await fetch('/api/health',{signal:ctrl.signal}).then(function(r){if(!r.ok)throw new Error('Health: '+r.status);return r.json()});
    ldMsg.textContent='Loading graph...';
    var g=await fetch('/api/graph',{signal:ctrl.signal}).then(function(r){if(!r.ok)throw new Error('Graph: '+r.status);return r.json()});
    clearTimeout(tid);
    healthData=h;graphData=g;
    ldMsg.textContent='Rendering...';
    processGraph();renderStatus();
    ld.classList.add('done');
  }catch(e){
    ldMsg.textContent='Error: '+e.message+'. Tap to retry.';
    ld.onclick=function(){ld.onclick=null;fetchData()};
  }
}

function processGraph(){
  if(!graphData)return;
  var nodeById={};
  graphData.nodes.forEach(function(n){nodeById[n.id]=n;n.x=Math.random()*W;n.y=Math.random()*H});
  graphData.links.forEach(function(l){
    l.source=(typeof l.source==='object'?l.source.id:l.source);
    l.target=(typeof l.target==='object'?l.target.id:l.target);
  });
  simNodes=graphData.nodes.map(function(n){return Object.assign({},n)});
  var nMap=new Map(simNodes.map(function(n){return[n.id,n]}));
  simLinks=graphData.links.filter(function(l){return l.source&&l.target}).map(function(l){
    return Object.assign({},l,{source:nMap.get(l.source)||l.source,target:nMap.get(l.target)||l.target});
  });
  document.getElementById('s-grains').textContent=graphData.stats?graphData.stats.grains:simNodes.length;
  document.getElementById('s-cond').textContent=graphData.stats?graphData.stats.conduits:simLinks.length;
  document.getElementById('s-core').textContent=simNodes.filter(function(n){return n.decay_class==='core'}).length;
  runSim();
}

function runSim(){
  if(sim)sim.stop();
  sim=d3.forceSimulation(simNodes)
    .force('link',d3.forceLink(simLinks).id(function(d){return d.id}).distance(50).strength(0.3))
    .force('charge',d3.forceManyBody().strength(-120).distanceMax(200))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide(5))
    .alphaDecay(0.03)
    .on('tick',draw);
}

function renderStatus(){
  if(!healthData)return;
  var dot=document.getElementById('dot');
  dot.className='dot '+(healthData.status||'healthy');
}

// -- DRAWING --
function nodeColor(n){
  if(n.status==='dormant')return '#1e2d40';
  if(n.node_type==='entry')return '#7c3aed';
  if(n.decay_class==='core')return '#e0f2fe';
  if(n.decay_class==='ephemeral')return '#0e7490';
  return '#22d3ee';
}
function nodeRadius(n){
  if(n.node_type==='entry')return 4;
  if(n.decay_class==='core')return 8;
  return 6;
}
function edgeColor(l){
  if(l.direction==='bidirectional')return '#a78bfa';
  if(l.decay_class==='core')return '#38bdf8';
  if(l.decay_class==='ephemeral')return '#1e3a4a';
  return '#1e3f5a';
}

function draw(){
  if(!ctx||!canvas||!sim)return;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#080a0e';ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(transform.x,transform.y);
  ctx.scale(transform.k,transform.k);

  var now=Date.now();
  var visN=sim.nodes();
  var visL=sim.force('link').links();
  var selId=selectedNode?selectedNode.id:null;
  var searchQ=typeof searchQuery!=='undefined'?searchQuery.toLowerCase():'';
  var neighborIds=new Set();
  if(selId){
    neighborIds.add(selId);
    for(var i=0;i<visL.length;i++){
      var l=visL[i];
      var sid=typeof l.source==='object'?l.source.id:l.source;
      var tid=typeof l.target==='object'?l.target.id:l.target;
      if(sid===selId||tid===selId){neighborIds.add(sid);neighborIds.add(tid)}
    }
  }

  // Links
  for(var i=0;i<visL.length;i++){
    var l=visL[i];
    if(l.source.x==null||l.target.x==null)continue;
    var w=Math.max(0.3,(l.effective_weight||l.weight||0.3)*1.8);
    var sid=typeof l.source==='object'?l.source.id:l.source;
    var tid=typeof l.target==='object'?l.target.id:l.target;
    var alpha=selId?((sid===selId||tid===selId)?0.8:0.03):0.15;
    ctx.beginPath();ctx.moveTo(l.source.x,l.source.y);ctx.lineTo(l.target.x,l.target.y);
    ctx.strokeStyle=edgeColor(l);ctx.globalAlpha=alpha;ctx.lineWidth=w;ctx.stroke();ctx.globalAlpha=1;
  }

  // Nodes
  for(var i=0;i<visN.length;i++){
    var n=visN[i];
    if(n.x==null)continue;
    var r=nodeRadius(n);
    var alpha=selId?(neighborIds.has(n.id)?1:0.08):1;
    var color=nodeColor(n);

    // Core glow
    if(n.decay_class==='core'&&n.node_type==='grain'){
      var pulse=0.5+0.3*Math.sin(now/600+n.id.length);
      ctx.beginPath();ctx.arc(n.x,n.y,Math.max(1,r+6),0,Math.PI*2);
      ctx.fillStyle='#22d3ee';ctx.globalAlpha=pulse*0.12*alpha;ctx.fill();ctx.globalAlpha=1;
    }

    // Body
    ctx.beginPath();ctx.arc(n.x,n.y,Math.max(1,r),0,Math.PI*2);
    ctx.fillStyle=color;ctx.globalAlpha=(n.status==='dormant'?0.4:0.9)*alpha;ctx.fill();ctx.globalAlpha=1;

    // Dim non-matching nodes when searching
    var alpha=1;
    // Selection highlighting takes priority
    if(selId){
      alpha=neighborIds.has(n.id)?1:0.08;
    }else if(searchQ){
      var match=(n.label||'').toLowerCase().includes(searchQ)||n.id.toLowerCase().includes(searchQ)||(n.feature||'').toLowerCase().includes(searchQ);
      alpha=match?1:0.06;
    }
      ctx.beginPath();ctx.arc(n.x,n.y,r+3,0,Math.PI*2);
      ctx.strokeStyle='#22d3ee';ctx.lineWidth=2.5;ctx.globalAlpha=alpha;ctx.stroke();ctx.globalAlpha=1;
    }

    // Labels for important nodes
    if(alpha>0.3&&(r>=6||n.node_type==='entry')){
      var label=(n.label||n.id).substring(0,18);
      ctx.fillStyle='#8899b0';ctx.globalAlpha=alpha;ctx.font='8px system-ui';
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(label,n.x+r+3,n.y);ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}

// -- TOUCH HANDLERS --
function screenToWorld(cx,cy){return[(cx-transform.x)/transform.k,(cy-transform.y)/transform.k]}
function findNodeAt(cx,cy){
  var wxwy=screenToWorld(cx,cy);
  var wx=wxwy[0],wy=wxwy[1];
  var closest=null,minDist=15/transform.k;
  var nodes=sim?sim.nodes():[];
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];if(n.x==null)continue;
    var d=Math.sqrt((wx-n.x)*(wx-n.x)+(wy-n.y)*(wy-n.y));
    var r=nodeRadius(n);
    if(d<r+minDist){minDist=d;closest=n}
  }
  return closest;
}

function onTouchStart(e){
  e.preventDefault();
  touchStartTime=Date.now();
  if(e.touches.length===1){
    var t=e.touches[0];var rect=canvas.getBoundingClientRect();
    var cx=t.clientX-rect.left,cy=t.clientY-rect.top;
    var n=findNodeAt(cx,cy);
    if(n){dragNode=n;n.fx=n.x;n.fy=n.y;sim.alphaTarget(0.3).restart()}
    else{lastTouchCenter={x:cx,y:cy}}
  }else if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
    lastTouchCenter={x:(e.touches[0].clientX+e.touches[1].clientX)/2-canvas.getBoundingClientRect().left,y:(e.touches[0].clientY+e.touches[1].clientY)/2-canvas.getBoundingClientRect().top};
  }
}

function onTouchMove(e){
  e.preventDefault();
  if(e.touches.length===1&&dragNode){
    var t=e.touches[0];var rect=canvas.getBoundingClientRect();
    var w=sc(rect.left,t.clientX),h=sc(rect.top,t.clientY);
    var wxwy=screenToWorld(t.clientX-rect.left,t.clientY-rect.top);
    dragNode.x=wxwy[0];dragNode.y=wxwy[1];dragNode.fx=wxwy[0];dragNode.fy=wxwy[1];
  }else if(e.touches.length===1&&!dragNode){
    var t=e.touches[0];var rect=canvas.getBoundingClientRect();
    var cx=t.clientX-rect.left,cy=t.clientY-rect.top;
    if(lastTouchCenter){transform.x+=cx-lastTouchCenter.x;transform.y+=cy-lastTouchCenter.y;lastTouchCenter={x:cx,y:cy};draw()}
  }else if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var cxmid=(e.touches[0].clientX+e.touches[1].clientX)/2-canvas.getBoundingClientRect().left;
    var cymid=(e.touches[0].clientY+e.touches[1].clientY)/2-canvas.getBoundingClientRect().top;
    if(lastTouchDist>0){
      var scale=dist/lastTouchDist;
      var newK=Math.min(10,Math.max(0.15,transform.k*scale));
      transform.x=cxmid-(cxmid-transform.x)*newK/transform.k;
      transform.y=cymid-(cymid-transform.y)*newK/transform.k;
      transform.k=newK;draw();
    }
    lastTouchDist=dist;
  }
}
function sc(a,b){return b-a}

function onTouchEnd(e){
  if(dragNode){
    var elapsed=Date.now()-touchStartTime;
    if(elapsed<200){
      // Quick tap - select node
      selectNode(dragNode);
    }
    sim.alphaTarget(0.012);dragNode.fx=null;dragNode.fy=null;dragNode=null;
  }
  lastTouchDist=0;lastTouchCenter=null;
}

function onClick(e){
  var rect=canvas.getBoundingClientRect();
  var n=findNodeAt(e.clientX-rect.left,e.clientY-rect.top);
  if(n)selectNode(n);
  else deselectNode();
}

// -- SELECTION --
function selectNode(n){
  selectedNode=n;
  // Update bottom bar
  document.getElementById('bar-default').style.display='none';
  document.getElementById('bar-selected').style.display='flex';
  document.getElementById('bar-node-type').textContent=n.node_type;
  document.getElementById('bar-node-label').textContent=(n.label||n.id).substring(0,40);
  var btn=document.getElementById('inspect-btn');
  btn.classList.remove('hidden');
  // Color the type badge
  var tag=document.getElementById('bar-node-type');
  tag.className='bar-tag '+(n.node_type==='grain'?'grain':'entry');
  draw();
  // Clear hint
  clearTimeout(hintTimer);
  document.getElementById('hint').style.opacity='0';
}

function deselectNode(){
  selectedNode=null;
  document.getElementById('bar-default').style.display='flex';
  document.getElementById('bar-selected').style.display='none';
  draw();
}

function openSheet(){
  if(!selectedNode)return;
  var n=selectedNode;
  var color=nodeColor(n);
  var sc=document.getElementById('sheet-content');
  var h='<div class="s-header"><div class="s-icon" style="background:'+color+'22;border:1px solid '+color+'44"><svg width="16" height="16" viewBox="0 0 24 24" fill="'+color+'"><circle cx="12" cy="12" r="'+(n.node_type==='entry'?6:8)+'"/></svg></div><div><div class="s-title">'+(n.label||n.id)+'</div><div class="s-sub">'+n.id.substring(0,16)+'</div></div></div>';
  h+='<div class="s-section"><div class="s-section-title">Properties</div>';
  h+='<div class="s-row"><span class="s-key">Type</span><span class="s-val"><span class="bar-tag '+(n.node_type==='grain'?'grain':'entry')+'">'+n.node_type+'</span></span></div>';
  if(n.decay_class)h+='<div class="s-row"><span class="s-key">Decay class</span><span class="s-val"><span class="bar-tag '+n.decay_class+'">'+n.decay_class+'</span></span></div>';
  if(n.status)h+='<div class="s-row"><span class="s-key">Status</span><span class="s-val"><span class="bar-tag '+(n.status==='active'?'working':'dormant')+'">'+n.status+'</span></span></div>';
  if(n.context_spread!==undefined)h+='<div class="s-row"><span class="s-key">Context spread</span><span class="s-val">'+n.context_spread+'</span></div>';
  if(n.feature)h+='<div class="s-row"><span class="s-key">Feature</span><span class="s-val">'+n.feature+'</span></div>';
  if(n.provenance)h+='<div class="s-row"><span class="s-key">Provenance</span><span class="s-val">'+n.provenance+'</span></div>';
  h+='</div>';
  sc.innerHTML=h;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-backdrop').classList.add('open');
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('open');
}

// -- CONTROLS --
function zoomIn(){transform.k=Math.min(10,transform.k*1.3);draw()}
function zoomOut(){transform.k=Math.max(0.15,transform.k/1.3);draw()}
function resetView(){transform={x:0,y:0,k:1};draw()}

function toggleSearch(){
  var overlay=document.getElementById('search-overlay');
  overlay.classList.toggle('open');
  if(overlay.classList.contains('open'))document.getElementById('search-input').focus();
}

// -- FILTERS --
var activeFilters={grain:true,entry:true,active:true,dormant:false};
function toggleFilter(key){
  activeFilters[key]=!activeFilters[key];
  var btn=document.getElementById('f-'+key);
  if(btn)btn.classList.toggle('active',activeFilters[key]);
  processGraph();
}

function openWeight(){
  var overlay=document.getElementById('weight-overlay');
  overlay.classList.toggle('open');
}

function onWeight(val){
  weightThreshold=parseFloat(val);
  document.getElementById('weight-val').textContent=parseFloat(val).toFixed(2);
  processGraph();
}

var weightThreshold=0;
var activeFilters={grain:true,entry:true,active:true,dormant:false};

function processGraph(){
  if(!graphData)return;
  // Re-filter nodes
  var visNodes=graphData.nodes.filter(function(n){
    var typeOk=(n.node_type==='grain'&&activeFilters.grain)||(n.node_type==='entry'&&activeFilters.entry)||(n.node_type==='entry_point'&&activeFilters.entry);
    var st=n.status||'active';
    var statusOk=(st==='active'?activeFilters.active:(st==='dormant'?activeFilters.dormant:true));
    return typeOk&&statusOk;
  });
  var visIds=new Set(visNodes.map(function(n){return n.id}));
  var visLinks=graphData.links.filter(function(l){
    var sid=typeof l.source==='object'?l.source.id:l.source;
    var tid=typeof l.target==='object'?l.target.id:l.target;
    return visIds.has(sid)&&visIds.has(tid)&&(l.effective_weight||l.weight||0)>=weightThreshold;
  });
  simNodes=visNodes.map(function(n){return Object.assign({},n)});
  var nMap=new Map(simNodes.map(function(n){return[n.id,n]}));
  simLinks=visLinks.map(function(l){return Object.assign({},l,{source:nMap.get(typeof l.source==='object'?l.source.id:l.source)||l.source,target:nMap.get(typeof l.target==='object'?l.target.id:l.target)||l.target})});
  runSim();
}

function onSearch(val){
  var q=val.toLowerCase().trim();
  var results=document.getElementById('search-results');
  if(!q){
    results.innerHTML='<div style="color:#5a6480;font-size:12px;padding:8px 0">Type to search across all node labels, IDs, features, and content</div>';
    // Clear search highlighting on graph
    searchQuery='';
    if(sim)draw();
    return;
  }
  searchQuery=q;
  // Search across ALL fields: label, id, feature, provenance, status, decay_class
  var allNodes=graphData?graphData.nodes:[];
  var matches=allNodes.filter(function(n){
    return (n.label||'').toLowerCase().includes(q)
      ||n.id.toLowerCase().includes(q)
      ||(n.feature||'').toLowerCase().includes(q)
      ||(n.feature||'').toLowerCase().includes(q)
      ||(n.provenance||'').toLowerCase().includes(q)
      ||(n.status||'').toLowerCase().includes(q)
      ||(n.decay_class||'').toLowerCase().includes(q)
      ||(n.node_type||'').toLowerCase().includes(q);
  }).slice(0,30);
  results.innerHTML=matches.length?matches.map(function(n){
    var label=(n.label||n.id).substring(0,50);
    var meta=n.node_type+(n.decay_class?' - '+n.decay_class:'')+(n.feature?' - '+n.feature:'');
    return '<div class="sr-item" onclick="selectFromSearch(\''+n.id+'\')"><div class="sr-label">'+label+'</div><div class="sr-meta">'+meta+'</div></div>';
  }).join(''):'<div style="color:#5a6480;font-size:12px;padding:8px 0">No results for "'+q+'"</div>';
  // Highlight matching nodes on graph
  if(sim)draw();
}

function selectFromSearch(id){
  // Find in simNodes (currently visible) first, then graphData
  var n=simNodes.find(function(x){return x.id===id});
  if(!n && graphData){
    // Node might be filtered out - add it temporarily
    var orig=graphData.nodes.find(function(x){return x.id===id});
    if(orig)selectNodeDirect(orig);
    return;
  }
  if(n)selectNodeDirect(n);
  toggleSearch();
}

function selectNodeDirect(n){
  selectedNode=n;
  document.getElementById('bar-default').style.display='none';
  document.getElementById('bar-selected').style.display='flex';
  document.getElementById('bar-node-type').textContent=n.node_type;
  document.getElementById('bar-node-type').className='bar-tag '+(n.node_type==='grain'?'grain':'entry');
  document.getElementById('bar-node-label').textContent=(n.label||n.id).substring(0,40);
  draw();
  clearTimeout(hintTimer);
  document.getElementById('hint').style.opacity='0';
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}else{init()}
</script>
