<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #03020a; font-family: 'IBM Plex Mono', monospace; color: #cdc7dc; }
.shell { position: fixed; inset: 0; }
#c { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }

.topbar {
  position: absolute; top: 0; left: 0; right: 0; height: 44px;
  display: flex; align-items: center; padding: 0 18px; gap: 2px;
  background: linear-gradient(to bottom, rgba(6,3,14,0.82), rgba(6,3,14,0));
  z-index: 20; pointer-events: none;
}
.topbar > * { pointer-events: auto; }
.brand { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: rgba(190,170,215,0.6); margin-right: 22px; white-space: nowrap; }
.brand em { font-style: normal; opacity: .4; }
.tab { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: rgba(190,170,215,0.28); text-decoration: none; padding: 5px 9px; border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; white-space: nowrap; }
.tab:hover { color: rgba(210,195,230,0.7); }
.tab.active { color: #c9a8ff; border-bottom-color: rgba(201,168,255,0.6); }
.topbar-r { margin-left: auto; display: flex; align-items: center; gap: 18px; }
.live { display: flex; align-items: center; gap: 7px; font-size: 9px; letter-spacing: .12em; color: rgba(190,170,215,0.4); text-transform: uppercase; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: #c9a8ff; box-shadow: 0 0 8px #c9a8ff; animation: blink 3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.18} }
.evc { font-size: 9px; letter-spacing: .08em; color: rgba(190,170,215,0.32); min-width: 92px; text-align: right; }

.chrome { position: absolute; inset: 0; pointer-events: none; z-index: 12; }
.chrome > * { pointer-events: auto; }
.title-tag { position: absolute; top: 56px; left: 20px; font-size: 8px; letter-spacing: .3em; text-transform: uppercase; color: rgba(190,170,215,0.3); }
.cycle { position: absolute; top: 56px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 9px; font-size: 8px; letter-spacing: .2em; text-transform: uppercase; color: rgba(190,170,215,0.32); }
.cycle-bar { width: 78px; height: 1px; background: rgba(190,170,215,0.16); position: relative; overflow: hidden; }
.cycle-fill { position: absolute; top: 0; left: 0; height: 100%; width: 26px; background: linear-gradient(90deg, transparent, #c9a8ff, transparent); }

.signals { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 4px; max-width: 340px; pointer-events: none; }
.sig { display: grid; grid-template-columns: 7px 64px 1fr auto; align-items: center; gap: 9px; padding: 5px 10px; background: rgba(9,5,18,0.6); border-left: 1px solid rgba(190,170,215,0.22); font-size: 9px; letter-spacing: .04em; color: rgba(210,200,225,0.62); backdrop-filter: blur(4px); animation: sin .35s ease forwards; opacity: 0; }
@keyframes sin { from{opacity:0;transform:translateX(-7px)} to{opacity:1;transform:none} }
.sig .d { width: 6px; height: 6px; border-radius: 50%; }
.sig .t { letter-spacing: .14em; text-transform: uppercase; font-size: 8px; }
.sig .x { color: rgba(210,200,225,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sig .ts { color: rgba(210,200,225,0.18); font-size: 8px; }

.legend { position: absolute; bottom: 20px; right: 20px; background: rgba(9,5,18,0.55); padding: 11px 14px; font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: rgba(210,200,225,0.42); display: flex; flex-direction: column; gap: 5px; pointer-events: none; backdrop-filter: blur(5px); border-left: 1px solid rgba(190,170,215,0.14); }
.legend .lh { font-size: 7px; opacity: .6; margin-top: 5px; }
.legend .lh:first-child { margin-top: 0; }
.legend .lr { display: grid; grid-template-columns: 8px 1fr; gap: 8px; align-items: center; }
.legend .ld { width: 7px; height: 7px; border-radius: 50%; }

.tip { position: absolute; pointer-events: none; max-width: 230px; padding: 9px 12px; background: rgba(9,5,16,0.92); border-left: 1px solid rgba(201,168,255,0.55); font-size: 10px; line-height: 1.5; color: #ece4f4; opacity: 0; transition: opacity .14s; backdrop-filter: blur(6px); z-index: 14; }
.tip.show { opacity: 1; }
.tip .h { font-size: 8px; letter-spacing: .15em; text-transform: uppercase; color: rgba(210,200,225,0.55); display: block; margin-bottom: 4px; }
.hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 8px; letter-spacing: .26em; text-transform: uppercase; color: rgba(190,170,215,0.2); pointer-events: none; }
</style>
</head>
<body>
<div class="shell">
  <canvas id="c"></canvas>
  <div class="topbar">
    <span class="brand">flux/<em>memory</em></span>
    <a class="tab" href="/">Graph</a>
    <a class="tab" href="/mycelium">Mycelium</a>
    <a class="tab" href="/globe">Globe</a>
    <a class="tab" href="/pool">Pool</a>
    <a class="tab active" href="/nebula">Nebula</a>
    <div class="topbar-r">
      <div class="live"><div class="live-dot"></div>live</div>
      <div class="evc" id="evc">0 activations</div>
    </div>
  </div>
  <div class="chrome">
    <div class="title-tag">breathing nebula</div>
    <div class="cycle"><span id="cycle-label">consolidation</span><div class="cycle-bar"><div class="cycle-fill" id="cycle-fill"></div></div></div>
    <div class="signals" id="signals"></div>
    <div class="legend">
      <div class="lh">Signal</div>
      <div class="lr"><div class="ld" style="background:#5fd7ff"></div>retrieve · filament</div>
      <div class="lr"><div class="ld" style="background:#ffcf6a"></div>store · ignition</div>
      <div class="lr"><div class="ld" style="background:#6ad296"></div>feedback · pulse</div>
      <div class="lr"><div class="ld" style="background:#b48aff"></div>decay · dispersal</div>
      <div class="lh">Gas = provenance</div>
      <div class="lr"><div class="ld" style="background:#eef4fa"></div>user-stated</div>
      <div class="lr"><div class="ld" style="background:#7fb8ff"></div>ai-stated</div>
      <div class="lr"><div class="ld" style="background:#b48aff"></div>ai-inferred</div>
      <div class="lr"><div class="ld" style="background:#96c8be"></div>external</div>
    </div>
    <div class="hint">hover the cloud</div>
    <div class="tip" id="tip"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════
//  FLUX MEMORY · BREATHING NEBULA
//  A volumetric gas cloud. Provenance = hue, domain = a lobe of the cloud,
//  density = how many memories live there. The whole field inhales and
//  exhales on the consolidation cycle. Activity threads a bright filament
//  through the gas and ignites the touched motes.
//
//  API:  window.fluxNebula.activate(type, ids, holdMs)
// ════════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = Math.min(1.75, window.devicePixelRatio || 1);
let W = 0, H = 0, CX = 0, CY = 0;

function resize(){
  W = window.innerWidth; H = window.innerHeight; CX = W*0.5; CY = H*0.52;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  build();
}

const SIG_COL = { retrieve:[95,215,255], store:[255,207,106], feedback:[106,210,150], decay:[180,138,255] };
const PROV = {
  user:     [238, 244, 250],
  ai:       [127, 184, 255],
  inferred: [180, 138, 255],
  external: [150, 200, 190],
};
const PROV_KEYS = ['user','ai','inferred','external'];
const DOMAINS = ['trading.strategies','self.reflection','tech.insight','preferences','conversations','external.refs','patterns'];
const SAMPLE = [
  ['MA cross fades in chop','stop at 1.5× ATR','volume divergence > price','options skew asymmetric'],
  ['I over-explain in tutorials','self-doubt loop after correction','pattern: nuance > brevity','apologise too early'],
  ['HNSW > IVF for recall','tsvector + GIN for FTS','token bucket beats fixed window','curl-noise for organic drift'],
  ['dark mode after sunset','no mushrooms','standup at 09:30 PT','avoid mtgs after 4pm'],
  ['daughter named Iris','resumed: pricing model v3','last asked: quaternions','re: misclassification'],
  ['arxiv 2310.06825','NeurIPS 2024','Stripe docs · webhooks','RFC 9110'],
  ['simpler model → fewer surprises','never trust unverified URLs','3 warnings → escalate','cache invalidate on schema'],
];

function rng(seed){ let s=seed>>>0; return ()=>{ s=Math.imul(s,1664525)+1013904223|0; return (s>>>0)/0xffffffff; }; }

let NEB = null;
let tick = 0, breath = 0, fieldRot = 0;
let mouse = { x:-9999, y:-9999 };
let hovered = null;
let activations = 0;
const filaments = [];
const sparks = [];
const stars = [];
let noisePattern = null;
function buildNoise(){
  const n = document.createElement('canvas'); n.width = n.height = 128;
  const nx = n.getContext('2d');
  const img = nx.createImageData(128,128);
  for (let i=0;i<img.data.length;i+=4){
    const v = 90 + Math.random()*76;     // mid-grey noise
    img.data[i]=img.data[i+1]=img.data[i+2]=v; img.data[i+3]=255;
  }
  nx.putImageData(img,0,0);
  noisePattern = ctx.createPattern(n,'repeat');
}

function build(){
  const r = rng(41);
  const VR = Math.min(W,H) * 0.40;        // volume radius (world units)
  const gauss = ()=> (r()+r()+r()-1.5);   // ~normal scatter

  // Domain lobes positioned in a 3D cluster
  const lobes = DOMAINS.map((_,i)=>{
    const a = (i/DOMAINS.length)*Math.PI*2 + r()*0.7;
    const rad = (0.35 + r()*0.6) * VR;
    return {
      x: Math.cos(a)*rad,
      y: Math.sin(a)*rad*0.66 + (r()-0.5)*VR*0.5,
      z: (r()-0.5)*2*VR*0.75,
      spread: VR*(0.26 + r()*0.20),
    };
  });

  // Background nebular gas clouds — big, soft, saturated, give volume
  const clouds = [];
  lobes.forEach((lobe,di)=>{
    const tint = PROV[PROV_KEYS[di % PROV_KEYS.length]];
    const n = 2 + Math.floor(r()*2);
    for (let k=0;k<n;k++){
      clouds.push({
        x: lobe.x + gauss()*lobe.spread*0.8,
        y: lobe.y + gauss()*lobe.spread*0.8,
        z: lobe.z + gauss()*lobe.spread*0.8,
        R: lobe.spread*(1.9 + r()*1.7),
        col: tint, a: 0.05 + r()*0.05, phase: r()*Math.PI*2,
      });
    }
  });

  const motes = [];
  const COUNT = Math.round(Math.min(360, Math.max(200, (W*H)/5200)));
  for (let i=0;i<COUNT;i++){
    const dom = i % DOMAINS.length;
    const lobe = lobes[dom];
    const hx = lobe.x + gauss()*lobe.spread;
    const hy = lobe.y + gauss()*lobe.spread;
    const hz = lobe.z + gauss()*lobe.spread;
    const prov = PROV_KEYS[Math.floor(r()*PROV_KEYS.length)];
    const mag = Math.pow(r(), 2.4);        // luminosity: many faint, few brilliant
    motes.push({
      id:i, dom, prov, col: PROV[prov],
      hx, hy, hz,                          // home (world)
      px:hx, py:hy, pz:hz,
      x:CX, y:CY, depth:0.5, scale:1,
      mag, hero: mag > 0.78,
      gasR: 26 + r()*70,
      base: 0.3 + mag*0.6,
      glow: 0,
      driftA: r()*Math.PI*2, driftR: 8 + r()*22, driftS: 0.15 + r()*0.4,
      spin: r()*Math.PI*2,
      phase: r()*Math.PI*2,
      content: SAMPLE[dom][Math.floor(r()*SAMPLE[dom].length)],
    });
  }

  stars.length = 0;
  for (let i=0;i<160;i++) stars.push({ x:r()*W, y:r()*H, r:0.3+r()*0.9, p:r()*Math.PI*2 });

  NEB = { motes, lobes, clouds, VR };
}

// classic 4-arm diffraction sparkle (gradient arms → bright centre, fading tips)
function drawSpike(x, y, len, a, col, rot){
  ctx.save();
  ctx.translate(x, y); ctx.rotate(rot);
  for (let i=0;i<2;i++){
    const g = ctx.createLinearGradient(-len,0,len,0);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(0.5,`rgba(255,255,255,${a})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.moveTo(-len,0); ctx.lineTo(len,0); ctx.stroke();
    ctx.rotate(Math.PI/2);
  }
  // shorter colored cross for tint
  const len2 = len*0.6;
  for (let i=0;i<2;i++){
    const g = ctx.createLinearGradient(-len2,0,len2,0);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(0.5,`rgba(${col[0]},${col[1]},${col[2]},${a*0.7})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(-len2,0); ctx.lineTo(len2,0); ctx.stroke();
    ctx.rotate(Math.PI/2);
  }
  ctx.restore();
}

// ── Activation ──────────────────────────────────────────────────────────────
function activate(type, ids, hold=1600){
  if (!NEB) return;
  activations++;
  document.getElementById('evc').textContent = activations + ' activation' + (activations!==1?'s':'');
  const col = SIG_COL[type] || [150,200,255];

  ids.forEach((id,i)=>{
    setTimeout(()=>{
      const m = NEB.motes[id];
      if (!m) return;
      if (type === 'retrieve' || type === 'feedback' || type === 'store'){
        // thread a glowing filament from the cloud core to the mote
        filaments.push(makeFilament(CX + (Math.random()-0.5)*60, CY + (Math.random()-0.5)*60, m, col, type));
      }
      if (type === 'store'){ m.base = Math.min(0.9, m.base + 0.08); m.size *= 1.04; }
      if (type === 'decay'){
        m.glow = 1;
        // dispersal puff
        for (let k=0;k<10;k++){
          const a = Math.random()*Math.PI*2, sp = 0.5+Math.random()*1.6;
          sparks.push({ x:m.x, y:m.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, col });
        }
        m.base = Math.max(0.08, m.base*0.6);
      }
      pushSignal(type, col, m);
    }, i*130);
  });
}

function makeFilament(sx, sy, mote, col, type){
  // curved path of points from source to mote (a few control points jittered)
  const pts = [];
  const N = 7;
  for (let k=0;k<=N;k++){
    const t = k/N;
    const x = sx + (mote.x - sx)*t;
    const y = sy + (mote.y - sy)*t;
    const perp = Math.sin(t*Math.PI) * 40 * (Math.random()-0.5);
    const dx = mote.x - sx, dy = mote.y - sy; const l = Math.hypot(dx,dy)||1;
    pts.push({ x: x + (-dy/l)*perp, y: y + (dx/l)*perp });
  }
  let len = 0; for (let k=0;k<pts.length-1;k++) len += Math.hypot(pts[k+1].x-pts[k].x, pts[k+1].y-pts[k].y);
  return { pts, len, t:0, speed:0.02+Math.random()*0.008, col, mote, type, fired:false };
}

function pushSignal(type, col, m){
  const box = document.getElementById('signals');
  const row = document.createElement('div'); row.className = 'sig';
  const now = new Date();
  const ts = [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  const c = `rgb(${col[0]},${col[1]},${col[2]})`;
  row.innerHTML = `<div class="d" style="background:${c};box-shadow:0 0 6px ${c}"></div>`+
    `<div class="t" style="color:${c}">${type}</div>`+
    `<div class="x">${m? m.content : '—'}</div>`+
    `<div class="ts">${ts}</div>`;
  box.prepend(row);
  while (box.children.length > 5) box.removeChild(box.lastChild);
}

// ── Draw ────────────────────────────────────────────────────────────────────
function draw(){
  tick++;
  breath += 0.006;
  fieldRot += 0.0013;
  const bw = (Math.sin(breath)+1)/2;           // 0..1
  const inhale = 0.94 + bw*0.10;               // global scale around centre

  // base — deep void with a compact saturated core glow
  ctx.fillStyle = '#020107';
  ctx.fillRect(0,0,W,H);
  const base = ctx.createRadialGradient(CX, CY, 10, CX, CY, Math.max(W,H)*0.62);
  base.addColorStop(0, 'rgba(26,14,42,0.85)');
  base.addColorStop(0.45, 'rgba(10,6,22,0.5)');
  base.addColorStop(1, 'rgba(2,1,7,0)');
  ctx.fillStyle = base; ctx.fillRect(0,0,W,H);

  // far background starfield
  ctx.globalCompositeOperation = 'lighter';
  for (const s of stars){
    const tw = 0.3 + Math.sin(tick*0.03 + s.p)*0.5;
    if (tw < 0.05) continue;
    ctx.fillStyle = `rgba(200,210,235,${0.04+tw*0.14})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }

  if (NEB){
    const VR = NEB.VR;
    const cosA = Math.cos(fieldRot), sinA = Math.sin(fieldRot);
    const cosT = Math.cos(0.34), sinT = Math.sin(0.34);   // fixed view tilt (slightly from above)
    const FOCAL = VR * 2.4;
    const project = (wx, wy, wz)=>{
      let x = wx*cosA - wz*sinA;          // spin around Y
      let z = wx*sinA + wz*cosA;
      const y2 = wy*cosT - z*sinT;        // tilt around X
      const z2 = wy*sinT + z*cosT;
      const persp = FOCAL / (FOCAL + z2 + VR*0.2);
      return { sx: CX + x*persp*inhale, sy: CY + y2*persp*inhale, persp, depth:(z2+VR)/(2*VR) };
    };

    // 1 ── volumetric gas clouds (far → near)
    const cl = NEB.clouds.map(c=>({ c, p: project(c.x,c.y,c.z) })).sort((a,b)=> b.p.depth - a.p.depth);
    for (const {c,p} of cl){
      const fog = 0.5 + (1-p.depth)*0.7;
      const breathe = 0.8 + 0.4*Math.sin(breath + c.phase);
      const R = c.R * p.persp * inhale;
      const a = c.a * fog * breathe * (0.7 + bw*0.5);
      const g = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, R);
      g.addColorStop(0, `rgba(${c.col[0]},${c.col[1]},${c.col[2]},${a})`);
      g.addColorStop(0.5, `rgba(${c.col[0]},${c.col[1]},${c.col[2]},${a*0.4})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.sx,p.sy,R,0,Math.PI*2); ctx.fill();
    }

    // 2 ── update mote positions + project
    for (const m of NEB.motes){
      m.driftA += 0.004 * m.driftS;
      m.px = m.hx + Math.cos(m.driftA)*m.driftR;
      m.py = m.hy + Math.sin(m.driftA*1.3)*m.driftR*0.8;
      m.pz = m.hz + Math.cos(m.driftA*0.7)*m.driftR*0.6;
      const p = project(m.px, m.py, m.pz);
      m.x = p.sx; m.y = p.sy; m.depth = p.depth; m.scale = p.persp;
      m.glow *= 0.95;
    }

    // 3 ── draw memories as stars in the volume (far → near for correct layering)
    const order = NEB.motes.slice().sort((a,b)=> b.depth - a.depth);
    for (const m of order){
      const col = m.col;
      const fog = (1 - m.depth*0.7);
      const flick = 0.8 + Math.sin(tick*0.05 + m.phase)*0.2;
      const lum = Math.max(0, (m.base*flick*fog*(0.55+bw*0.5) + m.glow));
      const persp = m.scale * inhale;

      // diffuse gas halo around each grain
      const R = m.gasR * persp * (1 + m.glow*0.6);
      const ga = 0.10 * lum;
      const g = ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,R);
      g.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},${ga})`);
      g.addColorStop(0.5, `rgba(${col[0]},${col[1]},${col[2]},${ga*0.4})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(m.x,m.y,R,0,Math.PI*2); ctx.fill();

      // bright star core
      const coreA = Math.min(1, (0.35 + m.mag*0.8)*lum + m.glow);
      const cr = (0.8 + m.mag*2.6) * persp + m.glow*3;
      const cg = ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,Math.max(2,cr*3.2));
      cg.addColorStop(0, `rgba(255,255,255,${coreA})`);
      cg.addColorStop(0.4, `rgba(${col[0]},${col[1]},${col[2]},${coreA*0.7})`);
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(m.x,m.y,Math.max(2,cr*3.2),0,Math.PI*2); ctx.fill();

      // diffraction sparkle for hero / ignited stars
      if (m.hero || m.glow > 0.2){
        const sp = cr*6 + m.glow*22;
        const sa = Math.min(0.9, (m.mag*0.5 + m.glow)*0.9*fog + 0.12);
        drawSpike(m.x, m.y, sp, sa, col, m.spin + tick*0.002);
      }

      if (hovered === m){
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},0.8)`;
        ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(m.x,m.y,Math.max(12,R*0.5),0,Math.PI*2); ctx.stroke();
        ctx.globalCompositeOperation = 'lighter';
      }
    }
  }

  // filaments
  for (let i=filaments.length-1;i>=0;i--){
    const f = filaments[i];
    f.t += f.speed;
    const head = Math.min(1, f.t) * f.len;
    const tail = Math.max(0, head - 130);
    // collect the visible portion as one smooth polyline
    const vis = [];
    let acc = 0;
    for (let k=0;k<f.pts.length-1;k++){
      const p1=f.pts[k], p2=f.pts[k+1];
      const segLen = Math.hypot(p2.x-p1.x, p2.y-p1.y);
      const segS=acc, segE=acc+segLen;
      if (segE < tail || segS > head){ acc=segE; continue; }
      const a1=Math.max(segS,tail), b1=Math.min(segE,head);
      const t1=(a1-segS)/segLen, t2=(b1-segS)/segLen;
      if (vis.length===0) vis.push({ x:p1.x+(p2.x-p1.x)*t1, y:p1.y+(p2.y-p1.y)*t1 });
      vis.push({ x:p1.x+(p2.x-p1.x)*t2, y:p1.y+(p2.y-p1.y)*t2 });
      acc=segE;
    }
    if (vis.length > 1){
      const overall = Math.min(1, f.t < 1 ? 1 : Math.max(0, 1-(f.t-1)/0.4));
      ctx.lineCap='round'; ctx.lineJoin='round';
      const segN = vis.length - 1;
      // subtle electric crackle on interior points (more toward the head)
      for (let k=1;k<vis.length-1;k++){
        const w = k/segN;
        vis[k].x += (Math.random()-0.5) * (0.4 + w*1.6);
        vis[k].y += (Math.random()-0.5) * (0.4 + w*1.6);
      }
      // glow trail — alpha + width + bloom ramp UP toward the head (tapered)
      for (let k=0;k<segN;k++){
        const p1=vis[k], p2=vis[k+1];
        const w = (k+1)/segN;
        const e = w*w;                       // ease toward head
        ctx.shadowColor = `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${(0.5+0.5*e)*overall})`;
        ctx.shadowBlur = 7 + 22*e;
        ctx.strokeStyle = `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${(0.10+0.6*e)*overall})`;
        ctx.lineWidth = 1 + 3.6*e;
        ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      }
      // crisp hot white core, brightening toward head
      ctx.shadowBlur = 0;
      for (let k=0;k<segN;k++){
        const p1=vis[k], p2=vis[k+1];
        const w = (k+1)/segN;
        ctx.strokeStyle = `rgba(255,255,255,${(0.2+0.75*w)*overall})`;
        ctx.lineWidth = 0.7 + 1.3*w;
        ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      }
      // comet head — bright flash leading the discharge
      if (f.t <= 1){
        const hp = vis[vis.length-1];
        const flick = 0.85 + Math.random()*0.15;
        const hr = 18 * flick;
        const hg = ctx.createRadialGradient(hp.x,hp.y,0,hp.x,hp.y,hr);
        hg.addColorStop(0, `rgba(255,255,255,${0.98*overall})`);
        hg.addColorStop(0.28, `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${0.85*overall})`);
        hg.addColorStop(0.6, `rgba(${f.col[0]},${f.col[1]},${f.col[2]},${0.3*overall})`);
        hg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(hp.x,hp.y,hr,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(255,255,255,${overall})`;
        ctx.beginPath(); ctx.arc(hp.x,hp.y,1.8*flick,0,Math.PI*2); ctx.fill();
      }
    }
    if (f.t >= 1 && !f.fired){
      f.fired = true; f.mote.glow = 1;
      for (let k=0;k<8;k++){ const a=Math.random()*Math.PI*2, sp=0.4+Math.random()*1.4;
        sparks.push({ x:f.mote.x, y:f.mote.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, col:f.col }); }
    }
    if (f.t >= 1.4) filaments.splice(i,1);
  }
  ctx.shadowBlur = 0;

  // sparks
  for (let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vx*=0.96; s.vy*=0.96; s.life -= 0.022;
    if (s.life <= 0){ sparks.splice(i,1); continue; }
    ctx.fillStyle = `rgba(${s.col[0]},${s.col[1]},${s.col[2]},${s.life*0.8})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.life*1.6, 0, Math.PI*2); ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';

  // vignette
  const vg = ctx.createRadialGradient(CX,CY,Math.min(W,H)*0.34,CX,CY,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(2,1,8,0.62)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

  const cf = document.getElementById('cycle-fill');
  if (cf){ cf.style.transform = `translateX(${bw*52}px)`;
    document.getElementById('cycle-label').textContent = Math.sin(breath) > 0 ? 'consolidation' : 'pruning'; }

  requestAnimationFrame(draw);
}

// ── Hover ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (!NEB) return;
  let best=null, bd=1e9;
  for (const m of NEB.motes){
    const d = Math.hypot(m.x-mouse.x, m.y-mouse.y);
    if (d < Math.max(16, m.size*0.35) && d < bd){ bd=d; best=m; }
  }
  hovered = best;
  const tip = document.getElementById('tip');
  if (best){
    const provLabel = {user:'user-stated',ai:'ai-stated',inferred:'ai-inferred',external:'external'}[best.prov];
    tip.innerHTML = `<span class="h" style="color:rgb(${best.col[0]},${best.col[1]},${best.col[2]})">${DOMAINS[best.dom]} · ${provLabel}</span>${best.content}`;
    tip.style.left = Math.min(W-240, mouse.x+16)+'px';
    tip.style.top = Math.max(60, mouse.y-12)+'px';
    tip.classList.add('show');
    canvas.style.cursor = 'pointer';
  } else { tip.classList.remove('show'); canvas.style.cursor='default'; }
});
canvas.addEventListener('mouseleave', ()=>{ hovered=null; document.getElementById('tip').classList.remove('show'); });
canvas.addEventListener('click', ()=>{ if (hovered) activate('retrieve', [hovered.id]); });

// ── Ambient driver ───────────────────────────────────────────────────────────
function pick(n){ const out=[]; for(let i=0;i<n;i++) out.push(Math.floor(Math.random()*NEB.motes.length)); return out; }
function tickDriver(){
  if (NEB){
    const roll = Math.random();
    const type = roll<0.5 ? 'retrieve' : roll<0.72 ? 'feedback' : roll<0.9 ? 'store' : 'decay';
    const n = type==='retrieve' ? 1+Math.floor(Math.random()*3) : 1+Math.floor(Math.random()*2);
    activate(type, pick(n));
  }
  setTimeout(tickDriver, 850 + Math.random()*1500);
}

window.fluxNebula = { activate };

// ── REAL DATA OVERLAY ────────────────────────────────────────────────────────
// Preserves build() aesthetic exactly. Only replaces synthetic per-mote
// content/id with real Flux grain labels + ids, and drives activations from
// real /api/events instead of tickDriver.
const PROV_MAP = { user_stated:'user', ai_stated:'ai', ai_inferred:'inferred', external_source:'external' };
let POOL_GRAINS = null;
const RID_TO_IDX = new Map();
let lastEventTs = null;

async function fetchGraph(){
  try {
    const data = await fetch('/api/graph').then(r => r.json());
    POOL_GRAINS = (data.nodes || []).filter(n => n.node_type === 'grain' && n.status === 'active');
    const rs = (s => () => { s = (Math.imul(s,1664525)+1013904223)|0; return ((s>>>0)/0xffffffff); })(7919);
    POOL_GRAINS.sort(() => rs() - 0.5);
  } catch(e) { POOL_GRAINS = []; }
}

function applyRealData(){
  if (!NEB || !POOL_GRAINS || POOL_GRAINS.length === 0) return;
  RID_TO_IDX.clear();
  NEB.motes.forEach((m, i) => {
    const g = POOL_GRAINS[i % POOL_GRAINS.length];
    if (!g) return;
    m.rid = g.id;
    m.content = g.label || m.content;
    RID_TO_IDX.set(g.id, i);
  });
}

async function pollEvents(){
  if (!NEB || RID_TO_IDX.size === 0) return;
  try {
    const data = await fetch('/api/events?limit=50').then(r => r.json());
    const events = (data.events || []).slice().reverse();
    for (const ev of events) {
      if (lastEventTs && ev.timestamp <= lastEventTs) continue;
      lastEventTs = ev.timestamp;
      handleEvent(ev);
    }
  } catch(e) {}
}

function handleEvent(ev){
  const d = ev.data || {};
  const gIdx = rid => RID_TO_IDX.has(rid) ? RID_TO_IDX.get(rid) : null;
  let type = null, ids = [];
  if (ev.category === 'retrieval' && ev.event === 'grains_returned') {
    type = 'retrieve';
    const list = d.grain_ids || [];
    ids = list.map(gIdx).filter(i => i !== null);
  } else if (ev.category === 'write' && ev.event === 'grain_stored') {
    type = 'store';
    if (d.grain_id) { const i = gIdx(d.grain_id); if (i !== null) ids = [i]; }
  } else if (ev.event === 'feedback_received') {
    type = 'feedback';
    const i = gIdx(d.grain_id); if (i !== null) ids = [i];
  } else if (ev.event === 'conduit_reinforced') {
    type = 'feedback';
    [d.from_id, d.to_id].forEach(rid => { const i = gIdx(rid); if (i !== null) ids.push(i); });
  } else if (ev.event === 'grain_decayed' || ev.event === 'grain_expired') {
    type = 'decay';
    const i = gIdx(d.grain_id); if (i !== null) ids = [i];
  }
  if (type && ids.length > 0) activate(type, ids);
}

window.addEventListener('resize', () => { resize(); applyRealData(); });
resize();
draw();

(async () => {
  await fetchGraph();
  applyRealData();
  lastEventTs = new Date().toISOString();
  setInterval(pollEvents, 2000);
  setInterval(async () => { await fetchGraph(); applyRealData(); }, 60000);
})();
</script>
