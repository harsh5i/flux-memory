<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Flux Memory Graph</title>
</head>
<body style="margin:0;font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9">
<div style="display:flex;height:100vh">
<div id="side" style="width:300px;background:#161b22;padding:20px;border-right:1px solid #30363d;overflow:auto">
<h1 style="color:#58a6ff;font-size:20px;margin-bottom:4px">🫒 Flux Memory</h1>
<p style="color:#8b949e;font-size:12px;margin-bottom:20px">Knowledge Graph</p>
<div id="stats"></div>
<div id="legend" style="background:#21262d;padding:12px;border-radius:8px;margin:12px 0">
<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px"><div style="width:10px;height:10px;border-radius:50%;background:#3fb950"></div>Core</div>
<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px"><div style="width:10px;height:10px;border-radius:50%;background:#58a6ff"></div>Working</div>
<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px"><div style="width:10px;height:10px;border-radius:50%;background:#d29922"></div>Entry</div>
</div>
<div id="info" style="background:#21262d;padding:12px;border-radius:8px;margin-top:16px">
<p style="color:#8b949e;font-size:11px;margin-bottom:8px">SELECTED NODE</p>
<div id="title" style="color:#f0f6fc;font-weight:600;margin-bottom:6px">Click a node</div>
<div id="meta" style="color:#8b949e;font-size:11px"></div>
<div id="content" style="color:#a6adc8;font-size:12px;line-height:1.5;margin-top:10px"></div>
</div>
</div>
<canvas id="c" style="flex:1"></canvas>
</div>
<script src="file:///tmp/flux_data.js"></script>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,nodes=[],edges=[],sel=null;
function resize(){W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W;canvas.height=H;draw()}
window.addEventListener('resize',resize);
function init(){
const m={};DATA.nodes.forEach((n,i)=>{const a=2*Math.PI*i/DATA.nodes.length,r=Math.min(W,H)*0.35*(n.type==='entry'?0.8:0.4+Math.random()*0.2);m[n.id]={...n,x:W/2+r*Math.cos(a),y:H/2+r*Math.sin(a),vx:0,vy:0}});
nodes=Object.values(m);
edges=DATA.edges.map(e=>({source:m[e.from],target:m[e.to],weight:e.weight})).filter(e=>e.source&&e.target);
const g=nodes.filter(n=>n.type==='grain').length,e=nodes.filter(n=>n.type==='entry').length,c=nodes.filter(n=>n.core).length;
document.getElementById('stats').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<div style="background:#21262d;padding:10px;border-radius:6px"><div style="font-size:22px;color:#58a6ff">${g}</div><div style="font-size:10px;color:#8b949e">GRAINS</div></div>
<div style="background:#21262d;padding:10px;border-radius:6px"><div style="font-size:22px;color:#58a6ff">${e}</div><div style="font-size:10px;color:#8b949e">ENTRIES</div></div>
<div style="background:#21262d;padding:10px;border-radius:6px"><div style="font-size:22px;color:#58a6ff">${edges.length}</div><div style="font-size:10px;color:#8b949e">EDGES</div></div>
<div style="background:#21262d;padding:10px;border-radius:6px"><div style="font-size:22px;color:#3fb950">${c}</div><div style="font-size:10px;color:#8b949e">CORE</div></div>
</div>`;
for(let i=0;i<200;i++)step();
draw();
}
function step(){
nodes.forEach(n=>{n.vx+=(W/2-n.x)*3e-4;n.vy+=(H/2-n.y)*3e-4;nodes.forEach(m=>{if(n===m)return;const dx=n.x-m.x,dy=n.y-m.y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d<60){n.vx+=dx/d*3;n.vy+=dy/d*3}})});
edges.forEach(e=>{const dx=e.target.x-e.source.x,dy=e.target.y-e.source.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-70)*.008;e.source.vx+=dx/d*f;e.source.vy+=dy/d*f;e.target.vx-=dx/d*f;e.target.vy-=dy/d*f});
nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.vx*=.85;n.vy*=.85;n.x=Math.max(20,Math.min(W-20,n.x));n.y=Math.max(20,Math.min(H-20,n.y))});
}
function draw(){
ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='#30363d';ctx.lineWidth=1;edges.forEach(e=>{ctx.beginPath();ctx.moveTo(e.source.x,e.source.y);ctx.lineTo(e.target.x,e.target.y);ctx.stroke()});
nodes.forEach(n=>{const r=n.type==='entry'?4:n.core?10:6;ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=n.type==='entry'?'#d29922':n.core?'#3fb950':'#58a6ff';ctx.fill();if(n===sel){ctx.strokeStyle='#f0f6fc';ctx.lineWidth=2;ctx.stroke()}});
}
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;sel=null;nodes.forEach(n=>{const R=n.type==='entry'?4:n.core?10:6;if(Math.hypot(mx-n.x,my-n.y)<R){sel=n;document.getElementById('title').textContent=n.label||n.id;document.getElementById('meta').textContent=(n.core?'Core • ':'')+(n.type==='entry'?'Entry':'Grain');document.getElementById('content').textContent=n.content||'';}});if(!sel){document.getElementById('title').textContent='Click a node';document.getElementById('meta').textContent='';document.getElementById('content').textContent=''}draw()});
let drag=null;canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;nodes.forEach(n=>{const R=n.type==='entry'?4:n.core?10:6;if(Math.hypot(mx-n.x,my-n.y)<R)drag=n})});
canvas.addEventListener('mousemove',e=>{if(!drag)return;const r=canvas.getBoundingClientRect();drag.x=e.clientX-r.left;drag.y=e.clientY-r.top;draw()});
canvas.addEventListener('mouseup',()=>drag=null);
resize();init();
</script>
</body>
</html>
