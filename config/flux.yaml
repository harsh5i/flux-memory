# Flux Memory v0.5 — configuration file
# All values here are the spec defaults (Section 5). Override any to tune.
# Unknown keys are ignored with a warning; missing keys use the defaults.

# --- Propagation ---
ATTENUATION: 0.85
ACTIVATION_THRESHOLD: 0.15
MAX_HOPS: 5
TOP_K: 5

# --- Learning & decay ---
LEARNING_RATE: 0.05
DECAY_FACTOR: 0.85
WEIGHT_CEILING: 0.95
WEIGHT_FLOOR: 0.05

HALF_LIFE_CORE_HOURS: 720.0       # 30 days
HALF_LIFE_WORKING_HOURS: 168.0    # 7 days
HALF_LIFE_EPHEMERAL_HOURS: 48.0   # 2 days

# --- Promotion & clustering ---
PROMOTION_THRESHOLD: 3
CLUSTER_TOUCH_THRESHOLD: 1.0
ENTRY_COOCCURRENCE_THRESHOLD: 10
CLUSTER_WINDOW_DAYS: 30
CLUSTER_MIN_SIZE: 3
LOUVAIN_RESOLUTION: 1.0
LOUVAIN_SEED: 42
CLUSTER_RECOMPUTE_MIN_INTERVAL_DAYS: 7
CLUSTER_INHERIT_OVERLAP_MIN: 0.30
CLUSTER_DISSOLVE_DECAY: 0.5

# --- Trace retention ---
TRACE_RETENTION_COUNT: 10000
TRACE_RETENTION_DAYS: 30

# --- Expansion (Track 6) ---
EXPANSION_CONFIDENCE_THRESHOLD: 0.4
EXPANSION_CANDIDATES_PER_CLUSTER: 2
EXPANSION_MAX_CANDIDATES: 3
EXPANSION_ENABLED: true

# --- Context shift (Track 6) ---
CONTEXT_SHIFT_WINDOW: 30
CONTEXT_SHIFT_DROP_THRESHOLD: 0.25
CONTEXT_SHIFT_RECOVERY_RETRIEVALS: 50
CONTEXT_SHIFT_ENABLED: true

# --- Quarantine & usefulness ---
USEFULNESS_WINDOW_DAYS: 7
QUARANTINE_USEFULNESS_THRESHOLD: 0.2
QUARANTINE_MIN_RETRIEVALS: 10
QUARANTINE_CORRECTION_COUNT: 3
QUARANTINE_PERIOD_DAYS: 30
CORRECTION_DETECTION_TURNS: 3

# --- Cleanup ---
CLEANUP_INTERVAL_HOURS: 6.0
CLEANUP_STALE_HOURS: 72.0
CLEANUP_BATCH_SIZE: 1000

# --- New conduit grace ---
NEW_CONDUIT_GRACE_HOURS: 72.0
NEW_CONDUIT_GRACE_MULTIPLIER: 2.0
NEW_CONDUIT_MIN_WEIGHT: 0.10

# --- Vector fallback ---
FALLBACK_CONFIDENCE_THRESHOLD: 0.25
VECTOR_FALLBACK_K: 10
VECTOR_FALLBACK_SCALE: 0.5

# --- Initial weights ---
INITIAL_SHORTCUT_WEIGHT: 0.50
INITIAL_ENTRY_WEIGHT: 0.50
INITIAL_WEIGHT_SCALE: 0.50
SHORTCUT_THRESHOLD: 3
MAX_EDGES_PER_GRAIN: 50

# --- Lifecycle ---
DORMANCY_LIMIT_DAYS: 30
EXPLORATION_BOOST: 1.5

# --- Admin channel ---
PURGE_UNDO_WINDOW_HOURS: 24.0

# --- LLM backend (not in spec §5; implementation-specific) ---
# LLM_BASE_URL: http://localhost:11434   # Ollama API base URL
# LLM_MODEL: llama3.1:8b
# LLM_TIMEOUT_SECONDS: 30.0

# --- Embedding model ---
# EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
