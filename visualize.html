<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Flux Memory Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #161b22; padding: 20px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        #graph { flex: 1; position: relative; background: #0d1117; }
        h1 { color: #58a6ff; font-size: 18px; margin-bottom: 4px; }
        .subtitle { color: #8b949e; font-size: 11px; margin-bottom: 16px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .stat { background: #21262d; padding: 10px; border-radius: 6px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #58a6ff; }
        .stat-label { font-size: 10px; color: #8b949e; }
        #node-info { background: #21262d; padding: 12px; border-radius: 6px; margin-top: auto; min-height: 150px; }
        #node-info h3 { font-size: 11px; color: #8b949e; margin-bottom: 8px; }
        #node-label { color: #f0f6fc; font-weight: 600; margin-bottom: 8px; }
        #node-content { font-size: 12px; color: #8b949e; line-height: 1.5; word-wrap: break-word; }
        .legend { margin: 16px 0; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 4px 0; font-size: 11px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-core { background: #3fb950; }
        .dot-working { background: #58a6ff; }
        .dot-entry { background: #d29922; }
        #canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h1>🫒 Flux Memory</h1>
            <div class="subtitle">Knowledge Graph Visualization</div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="nodes">—</div><div class="stat-label">Nodes</div></div>
                <div class="stat"><div class="stat-value" id="edges">—</div><div class="stat-label">Edges</div></div>
                <div class="stat"><div class="stat-value" id="core">—</div><div class="stat-label">Core</div></div>
                <div class="stat"><div class="stat-value" id="entries">—</div><div class="stat-label">Entries</div></div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="dot dot-core"></div>Core grain (promoted)</div>
                <div class="legend-item"><div class="dot dot-working"></div>Working grain</div>
                <div class="legend-item"><div class="dot dot-entry"></div>Entry point</div>
            </div>
            <div id="node-info">
                <h3>Selected Node</h3>
                <div id="node-label">Click a node to inspect</div>
                <div id="node-content"></div>
            </div>
        </div>
        <div id="graph">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <script>
        // === GRAPH DATA (embedded) ===
        const graphData = {
            nodes: [],
            edges: []
        };
        
        // === CANVAS SETUP ===
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, nodes = [], edges = [], selectedNode = null;
        let offsetX = 0, offsetY = 0, scale = 1, isDragging = false, dragNode = null;
        
        function resize() {
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            canvas.width = width * devicePixelRatio;
            canvas.height = height * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
            draw();
        }
        
        window.addEventListener('resize', resize);
        
        // === LOAD DATA ===
        fetch('graph_data.json')
            .then(r => r.json())
            .then(data => {
                nodes = data.nodes || [];
                edges = data.edges || [];
                
                // Position nodes in a circle initially
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = Math.min(width, height) / 3;
                
                nodes.forEach((node, i) => {
                    const angle = (2 * Math.PI * i) / nodes.length;
                    node.x = centerX + radius * Math.cos(angle) * (0.5 + Math.random() * 0.5);
                    node.y = centerY + radius * Math.sin(angle) * (0.5 + Math.random() * 0.5);
                    node.vx = 0;
                    node.vy = 0;
                });
                
                // Update stats
                document.getElementById('nodes').textContent = nodes.length;
                document.getElementById('edges').textContent = edges.length;
                document.getElementById('core').textContent = nodes.filter(n => n.core).length;
                document.getElementById('entries').textContent = nodes.filter(n => n.type === 'entry').length;
                
                // Start simulation
                simulate();
            })
            .catch(err => {
                document.getElementById('node-content').textContent = 'Error loading: ' + err.message;
            });
        
        // === FORCE SIMULATION ===
        function simulate() {
            for (let i = 0; i < 100; i++) {
                step();
            }
            draw();
        }
        
        function step() {
            // Apply forces
            for (const node of nodes) {
                // Center gravity
                node.vx += (width/2 - node.x) * 0.001;
                node.vy += (height/2 - node.y) * 0.001;
                
                // Repulsion from other nodes
                for (const other of nodes) {
                    if (node === other) continue;
                    const dx = node.x - other.x;
                    const dy = node.y - other.y;
                    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    const force = 500 / (dist * dist);
                    node.vx += (dx / dist) * force;
                    node.vy += (dy / dist) * force;
                }
            }
            
            // Edge attraction
            for (const edge of edges) {
                const source = nodes.find(n => n.id === edge.from);
                const target = nodes.find(n => n.id === edge.to);
                if (!source || !target) continue;
                
                const dx = target.x - source.x;
                const dy = target.y - source.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                const force = (dist - 100) * 0.01;
                
                source.vx += (dx / dist) * force;
                source.vy += (dy / dist) * force;
                target.vx -= (dx / dist) * force;
                target.vy -= (dy / dist) * force;
            }
            
            // Apply velocity
            for (const node of nodes) {
                node.x += node.vx * 0.1;
                node.y += node.vy * 0.1;
                node.vx *= 0.9;
                node.vy *= 0.9;
            }
        }
        
        // === DRAW ===
        function draw() {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            
            // Draw edges
            ctx.strokeStyle = '#30363d';
            ctx.lineWidth = 1;
            for (const edge of edges) {
                const source = nodes.find(n => n.id === edge.from);
                const target = nodes.find(n => n.id === edge.to);
                if (!source || !target) continue;
                ctx.beginPath();
                ctx.moveTo(source.x, source.y);
                ctx.lineTo(target.x, target.y);
                ctx.stroke();
            }
            
            // Draw nodes
            for (const node of nodes) {
                const isEntry = node.type === 'entry';
                const size = isEntry ? 5 : (node.core ? 12 : 8);
                
                // Color
                if (isEntry) ctx.fillStyle = '#d29922';
                else if (node.core) ctx.fillStyle = '#3fb950';
                else ctx.fillStyle = '#58a6ff';
                
                // Draw circle
                ctx.beginPath();
                ctx.arc(node.x, node.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Stroke for selected
                if (node === selectedNode) {
                    ctx.strokeStyle = '#f0f6fc';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
            
            ctx.restore();
        }
        
        // === INTERACTION ===
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - offsetX) / scale;
            const my = (e.clientY - rect.top - offsetY) / scale;
            
            // Check if clicked on node
            for (const node of nodes) {
                const size = node.type === 'entry' ? 5 : (node.core ? 12 : 8);
                const dx = mx - node.x;
                const dy = my - node.y;
                if (dx*dx + dy*dy < size*size) {
                    dragNode = node;
                    selectedNode = node;
                    document.getElementById('node-label').textContent = node.label || node.id;
                    document.getElementById('node-content').textContent = node.content || '';
                    draw();
                    return;
                }
            }
            
            isDragging = true;
        });
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            if (dragNode) {
                dragNode.x = (e.clientX - rect.left - offsetX) / scale;
                dragNode.y = (e.clientY - rect.top - offsetY) / scale;
                draw();
            } else if (isDragging) {
                offsetX += e.movementX;
                offsetY += e.movementY;
                draw();
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            dragNode = null;
        });
        
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            scale *= delta;
            scale = Math.max(0.1, Math.min(4, scale));
            draw();
        });
        
        resize();
    </script>
</body>
</html>
